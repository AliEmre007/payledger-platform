name: payledger-local

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: payledger
      POSTGRES_USER: payledger_app
      POSTGRES_PASSWORD: payledger_dev_only
    ports:
      - "55433:5432"
    volumes:
      - payledger_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payledger_app -d payledger"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    volumes:
      - payledger_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_dev_only
    volumes:
      - payledger_keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: keycloak_admin_dev_only
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_dev_only
      KC_HEALTH_ENABLED: "true"
      PAYLEDGER_DEV_ALICE_PASSWORD: alice-dev-password
    ports:
      - "18081:8080"
      - "19000:9000"
    volumes:
      - ./keycloak/import:/opt/keycloak/data/import:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "{ printf 'HEAD /health/ready HTTP/1.0\r\n\r\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000"
        ]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  payledger_postgres_data:
  payledger_redis_data:
  payledger_keycloak_postgres_data:
