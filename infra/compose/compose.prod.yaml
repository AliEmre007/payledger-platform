name: payledger-prod

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - payledger_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 12

  backend-migrate:
    image: ${PAYLEDGER_BACKEND_IMAGE:-payledger-api:local}
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: "no"
    environment: &backend_environment
      SERVER_PORT: 18080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI:?set KEYCLOAK_ISSUER_URI}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-payledger-api}
      PAYLEDGER_MAX_REQUEST_BODY_BYTES: ${PAYLEDGER_MAX_REQUEST_BODY_BYTES:-131072}
      PAYLEDGER_RATE_LIMIT_ENABLED: ${PAYLEDGER_RATE_LIMIT_ENABLED:-true}
      PAYLEDGER_RATE_LIMIT_WINDOW: ${PAYLEDGER_RATE_LIMIT_WINDOW:-PT1M}
      PAYLEDGER_RATE_LIMIT_MAX_REQUESTS: ${PAYLEDGER_RATE_LIMIT_MAX_REQUESTS:-120}
      PAYLEDGER_MANAGEMENT_PROMETHEUS_PUBLIC: ${PAYLEDGER_MANAGEMENT_PROMETHEUS_PUBLIC:-false}
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_FLYWAY_ENABLED: "true"
    command:
      [
        "--spring.main.web-application-type=none",
        "--spring.main.banner-mode=off"
      ]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    image: ${PAYLEDGER_BACKEND_IMAGE:-payledger-api:local}
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend_environment
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: "false"
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:18080/actuator/health | grep -q '\"status\":\"UP\"'"
        ]
      interval: 15s
      timeout: 5s
      retries: 20
    expose:
      - "18080"
    ports:
      - "${PAYLEDGER_BACKEND_PUBLISHED_PORT:-18080}:18080"

  prometheus:
    image: prom/prometheus:v3.1.0
    restart: unless-stopped
    profiles: ["metrics"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - payledger_prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PROMETHEUS_PUBLISHED_PORT:-19090}:9090"

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    profiles: ["edge"]
    volumes:
      - ./nginx/payledger.conf:/etc/nginx/conf.d/default.conf:ro
      - ${TLS_CERTIFICATE_PATH:-./nginx/dev-cert.pem}:/etc/nginx/tls/tls.crt:ro
      - ${TLS_PRIVATE_KEY_PATH:-./nginx/dev-key.pem}:/etc/nginx/tls/tls.key:ro
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTPS_PUBLISHED_PORT:-18443}:443"

volumes:
  payledger_postgres_data:
  payledger_prometheus_data:
