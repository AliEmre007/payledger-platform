server:
  port: ${SERVER_PORT:18080}
  max-http-request-header-size: ${MAX_HTTP_REQUEST_HEADER_SIZE:16KB}

spring:
  application:
    name: payledger-api

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:18081/realms/payledger-local}
          audiences:
            - ${KEYCLOAK_AUDIENCE:payledger-api}

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:55433}/${POSTGRES_DB:payledger}
    username: ${POSTGRES_USER:payledger_app}
    password: ${POSTGRES_PASSWORD:payledger_dev_only}

  jackson:
    time-zone: UTC

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    clean-disabled: true
    validate-migration-naming: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  pattern:
    level: "%5p traceId=%X{traceId:-}"

payledger:
  management:
    prometheus-public: ${PAYLEDGER_MANAGEMENT_PROMETHEUS_PUBLIC:false}
  resilience:
    max-request-body-bytes: ${PAYLEDGER_MAX_REQUEST_BODY_BYTES:131072}
    rate-limit:
      enabled: ${PAYLEDGER_RATE_LIMIT_ENABLED:true}
      window: ${PAYLEDGER_RATE_LIMIT_WINDOW:PT1M}
      max-requests-per-window: ${PAYLEDGER_RATE_LIMIT_MAX_REQUESTS:120}
      money-moving-paths:
        - /api/v1/transfers
        - /api/v1/payment-intents
        - /api/v1/operations/payment-intents
        - /api/v1/operations/settlements
